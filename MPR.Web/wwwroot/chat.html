<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MPR Report Assistant</title>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --border:#2a2e37; --accent:#4f8cff; --text:#e6e8ec; --muted:#8b93a3; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: -apple-system, Segoe UI, Roboto, sans-serif; background:var(--bg); color:var(--text); }
  #app { max-width: 820px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
  header { padding: 16px 20px; border-bottom: 1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  header h1 { font-size: 16px; margin:0; font-weight:600; }
  #loginBar { display:flex; gap:8px; }
  #loginBar input { background:var(--panel); border:1px solid var(--border); color:var(--text); padding:6px 10px; border-radius:6px; font-size:13px; }
  #loginBar button { background:var(--accent); border:none; color:white; padding:6px 12px; border-radius:6px; cursor:pointer; font-size:13px; }
  #messages { flex:1; overflow-y:auto; padding: 20px; display:flex; flex-direction:column; gap:14px; }
  .msg { max-width: 75%; padding: 10px 14px; border-radius: 12px; line-height:1.45; white-space: pre-wrap; }
  .user { align-self:flex-end; background: var(--accent); color:white; border-bottom-right-radius:2px; }
  .assistant { align-self:flex-start; background: var(--panel); border:1px solid var(--border); border-bottom-left-radius:2px; }
  .tool-tag { align-self:flex-start; font-size:11px; color:var(--muted); padding-left:4px; }
  #inputBar { border-top: 1px solid var(--border); padding: 14px 20px; display:flex; gap:10px; align-items:flex-end; }
  #inputBar textarea { flex:1; resize:none; background:var(--panel); border:1px solid var(--border); color:var(--text); padding:10px 12px; border-radius:8px; font-size:14px; font-family:inherit; min-height:20px; max-height:120px; }
  #inputBar button { background:var(--accent); border:none; color:white; padding:10px 18px; border-radius:8px; cursor:pointer; font-size:14px; }
  #uploadBtn { background:var(--panel); border:1px solid var(--border); color:var(--text); padding:10px 12px; border-radius:8px; cursor:pointer; }
  #uploadPanel { display:none; padding: 12px 20px; border-top:1px solid var(--border); background:var(--panel); gap:8px; flex-wrap:wrap; align-items:center; }
  #uploadPanel input, #uploadPanel select { background:#11141a; border:1px solid var(--border); color:var(--text); padding:6px 10px; border-radius:6px; font-size:13px; }
  #uploadPanel button { background:var(--accent); border:none; color:white; padding:6px 14px; border-radius:6px; cursor:pointer; font-size:13px; }
  .hint { color:var(--muted); font-size:12px; padding: 0 20px 10px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>MPR Report Assistant</h1>
    <div id="loginBar">
      <input id="userName" placeholder="username" value="admin" />
      <input id="password" type="password" placeholder="password" />
      <button onclick="login()">Log in</button>
      <span id="loginStatus" style="font-size:12px;color:var(--muted);"></span>
    </div>
  </header>

  <div id="messages"></div>
  <div class="hint">Tip: try "start a 4-week report for May 2026" or, once files are uploaded, "recalculate and show me the summary".</div>

  <div id="uploadPanel">
    <input type="file" id="fileInput" multiple accept="application/pdf" />
    <input type="number" id="periodIdForUpload" placeholder="Report Period ID" style="width:140px" />
    <input type="number" id="gradeIdForUpload" placeholder="Grade ID" style="width:100px" />
    <button onclick="doUpload()">Upload PDFs</button>
    <span id="uploadStatus" style="font-size:12px;color:var(--muted);"></span>
  </div>

  <div id="inputBar">
    <button id="uploadBtn" onclick="toggleUploadPanel()" title="Upload attendance PDFs">📎</button>
    <textarea id="messageInput" rows="1" placeholder="Message the MPR assistant..."></textarea>
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
let token = null;
let sessionId = null;

async function login() {
  const userName = document.getElementById('userName').value;
  const password = document.getElementById('password').value;
  const res = await fetch('/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userName, password })
  });
  const statusEl = document.getElementById('loginStatus');
  if (!res.ok) { statusEl.textContent = 'Login failed'; return; }
  const data = await res.json();
  token = data.token;
  statusEl.textContent = data.mustChangePassword ? 'Logged in (change password advised)' : 'Logged in';
  addMessage('assistant', "You're logged in. What would you like to do - start a new report, check on an existing one, or ask about attendance data?");
}

function toggleUploadPanel() {
  const p = document.getElementById('uploadPanel');
  p.style.display = p.style.display === 'flex' ? 'none' : 'flex';
}

async function doUpload() {
  if (!token) { alert('Log in first'); return; }
  const files = document.getElementById('fileInput').files;
  const periodId = document.getElementById('periodIdForUpload').value;
  const gradeId = document.getElementById('gradeIdForUpload').value;
  if (!files.length || !periodId || !gradeId) { alert('Pick files, report period ID, and grade ID'); return; }

  const form = new FormData();
  for (const f of files) form.append('files', f);
  form.append('gradeId', gradeId);

  document.getElementById('uploadStatus').textContent = 'Uploading...';
  const res = await fetch(`/api/wizard/periods/${periodId}/upload`, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${token}` },
    body: form
  });
  const statusEl = document.getElementById('uploadStatus');
  if (!res.ok) { statusEl.textContent = 'Upload failed'; return; }
  const uploaded = await res.json();
  statusEl.textContent = `Uploaded ${uploaded.length} file(s).`;

  // Tell the agent in plain text so it can pick up from here via list_uploaded_files.
  const names = uploaded.map(u => u.fileName).join(', ');
  document.getElementById('messageInput').value =
    `I've uploaded ${uploaded.length} file(s) for grade ID ${gradeId} on report period ${periodId}: ${names}. Please check their status and let me know when they're ready for review.`;
  sendMessage();
}

function addMessage(role, content) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = content;
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
}

function addToolTag(names) {
  if (!names.length) return;
  const div = document.createElement('div');
  div.className = 'tool-tag';
  div.textContent = 'used: ' + names.join(', ');
  document.getElementById('messages').appendChild(div);
}

async function sendMessage() {
  if (!token) { alert('Log in first'); return; }
  const input = document.getElementById('messageInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMessage('user', text);

  const res = await fetch('/api/chat/message', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
    body: JSON.stringify({ sessionId, message: text })
  });

  if (!res.ok) { addMessage('assistant', 'Something went wrong contacting the assistant.'); return; }
  const data = await res.json();
  sessionId = data.sessionId;
  addToolTag(data.toolsUsed || []);
  addMessage('assistant', data.reply);
}

document.getElementById('messageInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
</script>
</body>
</html>
